services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskapi
      POSTGRES_PASSWORD: taskapi123
      POSTGRES_DB: taskapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "host=db user=taskapi password=taskapi123 dbname=taskapi port=5432 sslmode=disable"
      JWT_SECRET: "super-secret-key-change-in-production"
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
